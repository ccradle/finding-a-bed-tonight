# Test overrides for lite profile
# SQL diagnostic logging — uncomment when debugging import/RLS issues.
# See memory: feedback_sql_logging_spring_data_jdbc for full setup.
# logging:
#   level:
#     org.springframework.jdbc.core.JdbcTemplate: DEBUG
#     org.springframework.jdbc.core.StatementCreatorUtils: TRACE
#     org.springframework.jdbc.support: DEBUG

spring:
  datasource:
    hikari:
      maximum-pool-size: 5
      connection-timeout: 10000
      minimum-idle: 2


bucket4j:
  enabled: false

fabt:
  scheduling:
    enabled: false
  deployment-tier: lite
  cache:
    l1-ttl-seconds: 60
  events:
    transport: spring
  jwt:
    secret: test-secret-for-integration-tests-only
