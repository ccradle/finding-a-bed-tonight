# Docker Engine 29+ raised the minimum API version from 1.24 to 1.44.
# docker-java 3.4.0 (bundled in TestContainers 1.20.4) defaults to 1.32,
# causing HTTP 400 from all Docker socket strategies. This overrides it.
# See: https://github.com/testcontainers/testcontainers-java/issues/11210
api.version=1.44
