# Caffeine JCache configuration (Typesafe HOCON format)
# Read by CaffeineCachingProvider via the JCache SPI.
# Cache names here must match bucket4j filter cache-name values in application.yml.

caffeine.jcache {

  rate-limit-login {
    key-type = java.lang.String
    value-type = java.lang.Object

    policy {
      eager-expiration {
        after-write = 15m
      }
      maximum {
        size = 100000
      }
    }
  }
}
