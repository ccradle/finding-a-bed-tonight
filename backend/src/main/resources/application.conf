# Caffeine JCache configuration (Typesafe HOCON format)
# Read by CaffeineCachingProvider via the JCache SPI.
# Cache names here must match bucket4j filter cache-name values in application.yml.

caffeine.jcache {

  rate-limit-login {
    key-type = java.lang.String
    value-type = java.lang.Object

    policy {
      eager-expiration {
        after-write = 15m
      }
      maximum {
        size = 100000
      }
    }
  }

  rate-limit-password-change {
    key-type = java.lang.String
    value-type = java.lang.Object

    policy {
      eager-expiration {
        after-write = 15m
      }
      maximum {
        size = 100000
      }
    }
  }

  rate-limit-admin-reset {
    key-type = java.lang.String
    value-type = java.lang.Object

    policy {
      eager-expiration {
        after-write = 15m
      }
      maximum {
        size = 100000
      }
    }
  }

  rate-limit-forgot-password {
    key-type = java.lang.String
    value-type = java.lang.Object

    policy {
      eager-expiration {
        after-write = 60m
      }
      maximum {
        size = 100000
      }
    }
  }

  rate-limit-verify-totp {
    key-type = java.lang.String
    value-type = java.lang.Object

    policy {
      eager-expiration {
        after-write = 15m
      }
      maximum {
        size = 100000
      }
    }
  }

  rate-limit-platform-login {
    key-type = java.lang.String
    value-type = java.lang.Object

    policy {
      eager-expiration {
        after-write = 15m
      }
      maximum {
        size = 100000
      }
    }
  }

  # G-4.5 §6.7 — DV referral create per-IP throttle (5 / hour).
  # after-write matches the bucket4j bandwidth window so a stale entry
  # is evicted exactly when its bucket would have refilled.
  rate-limit-dv-referral-create {
    key-type = java.lang.String
    value-type = java.lang.Object

    policy {
      eager-expiration {
        after-write = 60m
      }
      maximum {
        size = 100000
      }
    }
  }
}
