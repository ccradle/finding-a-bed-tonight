# Lite deployment profile: PostgreSQL only, no Redis or Kafka
# Target: rural counties, volunteer-run, $15-30/month

spring: {}

# Rate limiting disabled in lite profile — Karate e2e tests login 72+ times per
# suite run (24 features × 3 roles), and consecutive runs within the 15-minute
# bucket window exhaust any reasonable capacity. Production/demo deployments
# MUST NOT use the lite profile, or MUST override with bucket4j.enabled=true.
# See docs/runbook.md for deployment guidance.
bucket4j:
  enabled: false

fabt:
  deployment-tier: lite
  cache:
    l1-ttl-seconds: 60
  events:
    transport: spring
