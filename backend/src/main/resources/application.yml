server:
  port: 8080
  shutdown: graceful
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  application:
    name: finding-a-bed-tonight
  threads:
    virtual:
      enabled: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
    async:
      request-timeout: 600000  # 10 minutes — SSE connections need long async timeout (Design D3)

  datasource:
    url: jdbc:postgresql://localhost:5432/fabt
    username: ${FABT_DB_APP_USER:fabt_app}
    password: ${FABT_DB_APP_PASSWORD:fabt_app}
    hikari:
      # Little's Law: 70 peak concurrent × 0.17s avg hold = 12 connections needed.
      # 20 provides ~60% headroom for traffic spikes and GC pauses.
      maximum-pool-size: ${FABT_DB_POOL_SIZE:20}
      connection-timeout: 5000
      leak-detection-threshold: 10000

  flyway:
    enabled: true
    locations: classpath:db/migration
    # Flyway runs as the table owner (fabt) for DDL permissions.
    # Runtime queries use fabt_app (restricted, NOSUPERUSER) for RLS enforcement.
    url: ${FABT_DB_URL:jdbc:postgresql://localhost:5432/fabt}
    user: ${FABT_DB_OWNER_USER:fabt}
    password: ${FABT_DB_OWNER_PASSWORD:fabt}

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never

  jackson:
    default-property-inclusion: non_null
    deserialization:
      fail-on-null-for-primitives: false

  security:
    oauth2:
      client:
        registration: {}
      resourceserver:
        jwt:
          jwk-set-uri: ${FABT_JWKS_URI:}

  profiles:
    default: lite

management.opentelemetry.tracing.export.otlp:
  endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}

management.otlp.metrics.export:
  enabled: false

management.tracing:
  sampling:
    probability: ${TRACING_SAMPLING_PROBABILITY:0.0}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db

springdoc:
  api-docs:
    path: /api/v1/api-docs
  swagger-ui:
    path: /api/v1/docs

resilience4j:
  circuitbreaker:
    instances:
      noaa-api:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
      webhook-delivery:
        sliding-window-size: 10
        failure-rate-threshold: 50
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
      fabt-jwks-endpoint:
        sliding-window-size: 5
        sliding-window-type: COUNT_BASED
        failure-rate-threshold: 50
        minimum-number-of-calls: 3
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        ignore-exceptions:
          - com.nimbusds.jose.JOSEException
          - org.springframework.security.oauth2.jwt.JwtException
  retry:
    instances:
      jwks-warmup:
        max-attempts: 30
        wait-duration: 2s
        retry-exceptions:
          - java.lang.Exception
      webhook-delivery:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 3
        retry-exceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException

fabt:
  deployment-tier: ${FABT_DEPLOYMENT_TIER:lite}
  jwt:
    # 60 minutes for dev/test (Playwright suites take 8-10 min).
    # Production should override to 15 via FABT_JWT_ACCESS_TOKEN_EXPIRY_MINUTES env var.
    access-token-expiry-minutes: ${FABT_JWT_ACCESS_TOKEN_EXPIRY_MINUTES:60}
  monitoring:
    noaa:
      coordinates: ${FABT_NOAA_LAT:35.8776},${FABT_NOAA_LON:-78.7875}
      station-id: ${FABT_NOAA_STATION:KRDU}

# Rate limiting — brute force protection on auth endpoints
# Uses JCache (JSR-107) backed by Caffeine for bucket4j
spring.cache:
  jcache:
    provider: com.github.benmanes.caffeine.jcache.spi.CaffeineCachingProvider

bucket4j:
  enabled: true
  cache-to-use: jcache
  filters:
    - cache-name: rate-limit-login
      url: /api/v1/auth/(login|refresh)
      http-response-body: '{"error":"rate_limited","message":"Too many requests. Try again later.","status":429}'
      http-content-type: application/json
      rate-limits:
        - cache-key: getRemoteAddr()
          bandwidths:
            - capacity: 10
              time: 15
              unit: minutes
    - cache-name: rate-limit-password-change
      url: /api/v1/auth/password
      http-response-body: '{"error":"rate_limited","message":"Too many password change attempts. Try again later.","status":429}'
      http-content-type: application/json
      rate-limits:
        - cache-key: getRemoteAddr()
          bandwidths:
            - capacity: 5
              time: 15
              unit: minutes
    - cache-name: rate-limit-admin-reset
      url: /api/v1/users/.*/reset-password
      http-response-body: '{"error":"rate_limited","message":"Too many password reset attempts. Try again later.","status":429}'
      http-content-type: application/json
      rate-limits:
        - cache-key: getRemoteAddr()
          bandwidths:
            - capacity: 10
              time: 15
              unit: minutes
    - cache-name: rate-limit-forgot-password
      url: /api/v1/auth/forgot-password
      http-response-body: '{"error":"rate_limited","message":"Too many reset requests. Try again later.","status":429}'
      http-content-type: application/json
      rate-limits:
        - cache-key: getRemoteAddr()
          bandwidths:
            - capacity: 3
              time: 60
              unit: minutes
    - cache-name: rate-limit-verify-totp
      url: /api/v1/auth/verify-totp
      http-response-body: '{"error":"rate_limited","message":"Too many verification attempts. Try again later.","status":429}'
      http-content-type: application/json
      rate-limits:
        - cache-key: getRemoteAddr()
          bandwidths:
            - capacity: 20
              time: 15
              unit: minutes
