server:
  port: 8080

spring:
  application:
    name: finding-a-bed-tonight

  datasource:
    url: jdbc:postgresql://localhost:5432/fabt
    username: ${FABT_DB_APP_USER:fabt_app}
    password: ${FABT_DB_APP_PASSWORD:fabt_app}

  flyway:
    enabled: true
    locations: classpath:db/migration
    # Flyway runs as the table owner (fabt) for DDL permissions.
    # Runtime queries use fabt_app (restricted, NOSUPERUSER) for RLS enforcement.
    url: ${FABT_DB_URL:jdbc:postgresql://localhost:5432/fabt}
    user: ${FABT_DB_OWNER_USER:fabt}
    password: ${FABT_DB_OWNER_PASSWORD:fabt}

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  security:
    oauth2:
      client:
        registration: {}

  profiles:
    default: lite

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db

springdoc:
  api-docs:
    path: /api/v1/api-docs
  swagger-ui:
    path: /api/v1/docs

fabt:
  deployment-tier: ${FABT_DEPLOYMENT_TIER:lite}
