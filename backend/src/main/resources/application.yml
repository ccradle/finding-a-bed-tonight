server:
  port: 8080

spring:
  application:
    name: finding-a-bed-tonight

  datasource:
    url: jdbc:postgresql://localhost:5432/fabt
    username: ${FABT_DB_APP_USER:fabt_app}
    password: ${FABT_DB_APP_PASSWORD:fabt_app}

  flyway:
    enabled: true
    locations: classpath:db/migration
    # Flyway runs as the table owner (fabt) for DDL permissions.
    # Runtime queries use fabt_app (restricted, NOSUPERUSER) for RLS enforcement.
    url: ${FABT_DB_URL:jdbc:postgresql://localhost:5432/fabt}
    user: ${FABT_DB_OWNER_USER:fabt}
    password: ${FABT_DB_OWNER_PASSWORD:fabt}

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  security:
    oauth2:
      client:
        registration: {}
      resourceserver:
        jwt:
          jwk-set-uri: ${FABT_JWKS_URI:}

  profiles:
    default: lite

management.otlp.tracing:
  endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}

management.tracing:
  sampling:
    probability: ${TRACING_SAMPLING_PROBABILITY:0.0}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db

springdoc:
  api-docs:
    path: /api/v1/api-docs
  swagger-ui:
    path: /api/v1/docs

resilience4j:
  circuitbreaker:
    instances:
      noaa-api:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
      webhook-delivery:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
      fabt-jwks-endpoint:
        sliding-window-size: 5
        sliding-window-type: COUNT_BASED
        failure-rate-threshold: 50
        minimum-number-of-calls: 3
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        ignore-exceptions:
          - com.nimbusds.jose.JOSEException
          - org.springframework.security.oauth2.jwt.JwtException
  retry:
    instances:
      jwks-warmup:
        max-attempts: 30
        wait-duration: 2s
        retry-exceptions:
          - java.lang.Exception

fabt:
  deployment-tier: ${FABT_DEPLOYMENT_TIER:lite}
  monitoring:
    noaa:
      coordinates: ${FABT_NOAA_LAT:35.8776},${FABT_NOAA_LON:-78.7875}
      station-id: ${FABT_NOAA_STATION:KRDU}
