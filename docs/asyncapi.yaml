asyncapi: 3.0.0

info:
  title: Finding A Bed Tonight — EventBus Contract
  version: 1.0.0
  description: |
    Internal event contract for the Finding A Bed Tonight (FABT) platform.

    All domain events share a common envelope (`DomainEvent`) with a
    channel-specific `payload` object nested inside. The same message
    schemas are used across all three deployment tiers:

    - **Lite** — Spring ApplicationEvents (in-process) or PostgreSQL
      LISTEN/NOTIFY for real-time push.
    - **Standard** — Same as Lite with Redis pub/sub acceleration.
    - **Full** — Apache Kafka topics.

    The transport changes; the message contract does not. Consumers
    should depend only on the schemas documented here, never on
    transport-specific headers or metadata.

    **Full-tier Kafka ACL requirement:** Before enabling the Full Spring
    profile with Kafka, topic ACLs MUST be configured at the broker level.
    Events containing `population_type: DV_SURVIVOR` reveal that a shelter
    serves domestic violence survivors — information protected by PostgreSQL
    RLS on the query path. On the event path, Kafka topic ACLs are the only
    enforcement mechanism. Only service accounts holding the `DV_REFERRAL`
    authorization role may consume the `availability.updated` and
    `reservation.*` topics. See `x-security` annotations on each channel.
  contact:
    name: FABT Maintainers
    url: https://github.com/ccradle/finding-a-bed-tonight
  license:
    name: MIT

defaultContentType: application/json

# ---------------------------------------------------------------------------
# Channels
# ---------------------------------------------------------------------------

channels:
  availabilityUpdated:
    address: availability.updated
    title: Availability Updated
    description: |
      Published whenever bed availability changes — whether through a
      coordinator update (PATCH /api/v1/shelters/{id}/availability) or a
      reservation state change (create, confirm, cancel, expire). Fired
      after the snapshot is persisted and L1/L2 caches are invalidated.
    x-security:
      dv-access-control: |
        Events where payload.population_type = DV_SURVIVOR MUST only be
        consumed by services holding the DV_REFERRAL authorization role.
        Full-tier Kafka: topic ACLs MUST restrict consumption to DV_REFERRAL
        service accounts. Lite/Standard: @EventListener methods MUST check
        SecurityContext for DV_REFERRAL before processing DV_SURVIVOR events.
    messages:
      availabilityUpdatedMessage:
        $ref: '#/components/messages/AvailabilityUpdatedMessage'

  reservationCreated:
    address: reservation.created
    title: Reservation Created
    description: |
      Published when an outreach worker creates a soft-hold bed reservation.
      A new availability snapshot is created with beds_on_hold incremented.
    x-security:
      dv-access-control: |
        Events where payload.population_type = DV_SURVIVOR MUST only be
        consumed by services holding the DV_REFERRAL authorization role.
    messages:
      reservationCreatedMessage:
        $ref: '#/components/messages/ReservationEventMessage'

  reservationConfirmed:
    address: reservation.confirmed
    title: Reservation Confirmed
    description: |
      Published when a reservation is confirmed (client arrived). The hold
      converts to occupancy: beds_on_hold decremented, beds_occupied incremented.
    x-security:
      dv-access-control: |
        Events where payload.population_type = DV_SURVIVOR MUST only be
        consumed by services holding the DV_REFERRAL authorization role.
    messages:
      reservationConfirmedMessage:
        $ref: '#/components/messages/ReservationEventMessage'

  reservationCancelled:
    address: reservation.cancelled
    title: Reservation Cancelled
    description: |
      Published when an outreach worker cancels a reservation. The held bed
      becomes available again: beds_on_hold decremented.
    x-security:
      dv-access-control: |
        Events where payload.population_type = DV_SURVIVOR MUST only be
        consumed by services holding the DV_REFERRAL authorization role.
    messages:
      reservationCancelledMessage:
        $ref: '#/components/messages/ReservationEventMessage'

  reservationExpired:
    address: reservation.expired
    title: Reservation Expired
    description: |
      Published when a reservation auto-expires (hold duration exceeded).
      The held bed becomes available again: beds_on_hold decremented.
      Fired by the scheduled expiry task (Lite) or Redis TTL listener
      (Standard/Full).
    x-security:
      dv-access-control: |
        Events where payload.population_type = DV_SURVIVOR MUST only be
        consumed by services holding the DV_REFERRAL authorization role.
    messages:
      reservationExpiredMessage:
        $ref: '#/components/messages/ReservationEventMessage'

  surgeActivated:
    address: surge.activated
    title: Surge Activated
    description: |
      Published when a CoC admin activates a surge or White Flag event via
      POST /api/v1/surge-events. The payload includes affected_shelter_count
      and estimated_overflow_beds computed at activation time. Fires after
      the surge_event row is persisted.
    x-security:
      dv-access-control: |
        Surge events may affect DV shelters within the bounding box.
        Consumers processing surge events that cross-reference shelter
        data MUST hold the DV_REFERRAL role to access DV shelter details.
    messages:
      surgeActivatedMessage:
        $ref: '#/components/messages/SurgeActivatedMessage'

  surgeDeactivated:
    address: surge.deactivated
    title: Surge Deactivated
    description: |
      Published when a surge event ends — either manually by an admin
      or automatically when the scheduled end time is reached.
    messages:
      surgeDeactivatedMessage:
        $ref: '#/components/messages/SurgeDeactivatedMessage'

  dvReferralRequested:
    address: dv-referral.requested
    title: DV Referral Requested
    description: |
      Published when an outreach worker requests a privacy-preserving
      referral to a DV shelter. The payload contains ZERO client PII —
      only the token ID, shelter ID, tenant ID, and urgency level.
      VAWA 34 U.S.C. 12291(b)(2) compliant.
    x-security:
      dv-access-control: |
        This event ALWAYS relates to DV shelters. ALL consumers MUST hold
        the DV_REFERRAL authorization role. Full-tier Kafka: topic ACLs MUST
        restrict to DV_REFERRAL service accounts only. Unauthorized consumption
        of referral events could reveal DV shelter operational patterns.
    messages:
      dvReferralRequestedMessage:
        $ref: '#/components/messages/DvReferralEventMessage'

  dvReferralResponded:
    address: dv-referral.responded
    title: DV Referral Responded
    description: |
      Published when DV shelter staff accepts or rejects a referral token.
      The payload contains ZERO client PII — only the token ID, shelter ID,
      and response status (ACCEPTED or REJECTED). No rejection reason is
      included in the event payload to minimize information in the event stream.
    x-security:
      dv-access-control: |
        This event ALWAYS relates to DV shelters. ALL consumers MUST hold
        the DV_REFERRAL authorization role.
    messages:
      dvReferralRespondedMessage:
        $ref: '#/components/messages/DvReferralEventMessage'

# ---------------------------------------------------------------------------
# Operations
# ---------------------------------------------------------------------------

operations:
  onAvailabilityUpdated:
    action: receive
    channel:
      $ref: '#/channels/availabilityUpdated'
    summary: Receive availability change events
    messages:
      - $ref: '#/channels/availabilityUpdated/messages/availabilityUpdatedMessage'

  onReservationCreated:
    action: receive
    channel:
      $ref: '#/channels/reservationCreated'
    summary: Receive reservation creation events
    messages:
      - $ref: '#/channels/reservationCreated/messages/reservationCreatedMessage'

  onReservationConfirmed:
    action: receive
    channel:
      $ref: '#/channels/reservationConfirmed'
    summary: Receive reservation confirmation events
    messages:
      - $ref: '#/channels/reservationConfirmed/messages/reservationConfirmedMessage'

  onReservationCancelled:
    action: receive
    channel:
      $ref: '#/channels/reservationCancelled'
    summary: Receive reservation cancellation events
    messages:
      - $ref: '#/channels/reservationCancelled/messages/reservationCancelledMessage'

  onReservationExpired:
    action: receive
    channel:
      $ref: '#/channels/reservationExpired'
    summary: Receive reservation expiry events
    messages:
      - $ref: '#/channels/reservationExpired/messages/reservationExpiredMessage'

  onSurgeActivated:
    action: receive
    channel:
      $ref: '#/channels/surgeActivated'
    summary: Receive surge activation events
    messages:
      - $ref: '#/channels/surgeActivated/messages/surgeActivatedMessage'

  onSurgeDeactivated:
    action: receive
    channel:
      $ref: '#/channels/surgeDeactivated'
    summary: Receive surge deactivation events
    messages:
      - $ref: '#/channels/surgeDeactivated/messages/surgeDeactivatedMessage'

  onDvReferralRequested:
    action: receive
    channel:
      $ref: '#/channels/dvReferralRequested'
    summary: Receive DV referral request events (DV_REFERRAL role required)
    messages:
      - $ref: '#/channels/dvReferralRequested/messages/dvReferralRequestedMessage'

  onDvReferralResponded:
    action: receive
    channel:
      $ref: '#/channels/dvReferralResponded'
    summary: Receive DV referral response events (DV_REFERRAL role required)
    messages:
      - $ref: '#/channels/dvReferralResponded/messages/dvReferralRespondedMessage'

# ---------------------------------------------------------------------------
# Components
# ---------------------------------------------------------------------------

components:

  # -------------------------------------------------------------------------
  # Messages
  # -------------------------------------------------------------------------

  messages:
    AvailabilityUpdatedMessage:
      name: AvailabilityUpdatedMessage
      title: Availability Updated
      contentType: application/json
      payload:
        $ref: '#/components/schemas/AvailabilityUpdatedEvent'

    ReservationEventMessage:
      name: ReservationEventMessage
      title: Reservation State Change
      contentType: application/json
      payload:
        $ref: '#/components/schemas/ReservationEvent'

    SurgeActivatedMessage:
      name: SurgeActivatedMessage
      title: Surge Activated
      contentType: application/json
      payload:
        $ref: '#/components/schemas/SurgeActivatedEvent'

    SurgeDeactivatedMessage:
      name: SurgeDeactivatedMessage
      title: Surge Deactivated
      contentType: application/json
      payload:
        $ref: '#/components/schemas/SurgeDeactivatedEvent'

    DvReferralEventMessage:
      name: DvReferralEventMessage
      title: DV Referral Event
      summary: |
        Published on dv-referral.requested and dv-referral.responded channels.
        Contains ZERO client PII — only token ID, shelter ID, and status.
        VAWA 34 U.S.C. 12291(b)(2) compliant.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/DvReferralEvent'

  # -------------------------------------------------------------------------
  # Schemas
  # -------------------------------------------------------------------------

  schemas:

    # -- Common DomainEvent envelope --------------------------------------

    DomainEventEnvelope:
      type: object
      description: |
        Common envelope shared by every domain event in the system.
        Channel-specific data lives inside the nested `payload` field.
      required:
        - id
        - type
        - schemaVersion
        - tenantId
        - timestamp
        - payload
      properties:
        id:
          type: string
          format: uuid
          description: Unique event identifier (idempotency key).
        type:
          type: string
          description: Dot-notation event type matching the channel address.
        schemaVersion:
          type: string
          description: Semantic version of this event schema.
          example: "1.0.0"
        tenantId:
          type: string
          format: uuid
          description: Tenant that owns the resource.
        timestamp:
          type: string
          format: date-time
          description: ISO-8601 instant when the event was produced.
        payload:
          type: object
          description: Channel-specific event data.

    # -- availability.updated ---------------------------------------------

    AvailabilityUpdatedEvent:
      allOf:
        - $ref: '#/components/schemas/DomainEventEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: availability.updated
            payload:
              $ref: '#/components/schemas/AvailabilityUpdatedPayload'

    AvailabilityUpdatedPayload:
      type: object
      description: |
        Snapshot of a single population-type availability row after the change.
        Published by AvailabilityService.createSnapshot() on every successful
        availability update. The beds_available_previous field is null when
        this is the first snapshot for the shelter/population combination.
      required:
        - shelter_id
        - tenant_id
        - shelter_name
        - population_type
        - beds_available
        - snapshot_ts
        - data_age_seconds
      properties:
        shelter_id:
          type: string
          format: uuid
          description: Shelter whose availability changed.
        tenant_id:
          type: string
          format: uuid
          description: Tenant (Continuum of Care) that owns the shelter.
        coc_id:
          type: string
          format: uuid
          description: |
            Continuum of Care identifier. Same value as tenant_id — provided
            as an alias for consumers that use CoC-centric terminology.
        shelter_name:
          type: string
          description: Human-readable shelter name (denormalized for consumers).
        population_type:
          type: string
          description: |
            Population type that changed (e.g. SINGLE_ADULT, FAMILY_WITH_CHILDREN).
            DV_SURVIVOR is a protected value — see x-security on channel definitions.
          enum:
            - SINGLE_ADULT
            - FAMILY_WITH_CHILDREN
            - WOMEN_ONLY
            - VETERAN
            - YOUTH_18_24
            - YOUTH_UNDER_18
            - DV_SURVIVOR  # Protected by DV_REFERRAL role — consumers MUST verify authorization before processing events with this population type
        beds_available:
          type: integer
          minimum: 0
          description: Current derived beds available (beds_total - beds_occupied - beds_on_hold).
        beds_available_previous:
          type: integer
          minimum: 0
          nullable: true
          description: |
            Derived beds available from the prior snapshot for this shelter +
            population type. Null when this is the first snapshot. Consumers
            can compute the change direction and magnitude without a follow-up
            API call (e.g. previous: 5, current: 2 → 3 beds were filled).
        snapshot_ts:
          type: string
          format: date-time
          description: Timestamp of the availability snapshot.
        data_age_seconds:
          type: integer
          minimum: 0
          description: |
            Seconds since the coordinator last confirmed the data.
            Always 0 at publish time; useful for staleness indicators
            when the event is cached or replayed.

    # -- surge.activated --------------------------------------------------

    SurgeActivatedEvent:
      allOf:
        - $ref: '#/components/schemas/DomainEventEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: surge.activated
            payload:
              $ref: '#/components/schemas/SurgeActivatedPayload'

    SurgeActivatedPayload:
      type: object
      description: Details of a newly activated surge / White Flag event.
      required:
        - surge_event_id
        - coc_id
        - reason
        - activated_by
        - activated_at
      properties:
        surge_event_id:
          type: string
          format: uuid
          description: Unique identifier for the surge event.
        coc_id:
          type: string
          format: uuid
          description: Continuum of Care activating the surge.
        reason:
          type: string
          description: Human-readable reason (e.g. "White Flag — overnight low below 32 F").
        bounding_box:
          type: object
          description: |
            Optional geographic bounding box limiting the surge area.
            Null means the entire CoC geography is in scope.
          properties:
            north:
              type: number
              format: double
              description: Northern latitude boundary.
            south:
              type: number
              format: double
              description: Southern latitude boundary.
            east:
              type: number
              format: double
              description: Eastern longitude boundary.
            west:
              type: number
              format: double
              description: Western longitude boundary.
          required:
            - north
            - south
            - east
            - west
        activated_by:
          type: string
          format: uuid
          description: User ID of the CoC admin who activated the surge.
        activated_at:
          type: string
          format: date-time
          description: Timestamp when the surge was activated.
        affected_shelter_count:
          type: integer
          minimum: 0
          nullable: true
          description: |
            Number of shelters within the surge bounding_box (or the entire CoC
            if bounding_box is null) that are currently active and participating
            in the platform. Null if the count cannot be determined at activation
            time. Provided as a convenience for consumers so they can reason
            about the scale of the surge without a follow-up query.
        estimated_overflow_beds:
          type: integer
          minimum: 0
          nullable: true
          description: |
            Sum of overflow_available beds across all shelters in scope at the
            moment of surge activation. Null if no shelters have reported overflow
            capacity. This is a point-in-time snapshot — actual available overflow
            beds will be reflected in subsequent availability.updated events as
            shelters update their counts.

    # -- surge.deactivated ------------------------------------------------

    SurgeDeactivatedEvent:
      allOf:
        - $ref: '#/components/schemas/DomainEventEnvelope'
        - type: object
          properties:
            type:
              type: string
              const: surge.deactivated
            payload:
              $ref: '#/components/schemas/SurgeDeactivatedPayload'

    SurgeDeactivatedPayload:
      type: object
      description: Confirmation that a surge event has ended.
      required:
        - surge_event_id
        - coc_id
        - deactivated_at
      properties:
        surge_event_id:
          type: string
          format: uuid
          description: Surge event that was deactivated.
        coc_id:
          type: string
          format: uuid
          description: Continuum of Care that owned the surge.
        deactivated_at:
          type: string
          format: date-time
          description: Timestamp when the surge was deactivated.

    # -- reservation.* events ------------------------------------------------

    ReservationEvent:
      allOf:
        - $ref: '#/components/schemas/DomainEventEnvelope'
        - type: object
          properties:
            type:
              type: string
              enum:
                - reservation.created
                - reservation.confirmed
                - reservation.cancelled
                - reservation.expired
            payload:
              $ref: '#/components/schemas/ReservationPayload'

    ReservationPayload:
      type: object
      description: |
        Payload for all reservation lifecycle events. The `type` field on the
        envelope distinguishes created/confirmed/cancelled/expired. Published
        by ReservationService on every state transition.
      required:
        - reservation_id
        - shelter_id
        - tenant_id
        - population_type
        - user_id
        - status
      properties:
        reservation_id:
          type: string
          format: uuid
          description: Unique identifier for the reservation.
        shelter_id:
          type: string
          format: uuid
          description: Shelter the bed is reserved at.
        tenant_id:
          type: string
          format: uuid
          description: Tenant (Continuum of Care) that owns the shelter.
        population_type:
          type: string
          description: |
            Population type the bed is reserved for.
            DV_SURVIVOR is a protected value — see x-security on channel definitions.
          enum:
            - SINGLE_ADULT
            - FAMILY_WITH_CHILDREN
            - WOMEN_ONLY
            - VETERAN
            - YOUTH_18_24
            - YOUTH_UNDER_18
            - DV_SURVIVOR  # Protected by DV_REFERRAL role — consumers MUST verify authorization before processing events with this population type
        user_id:
          type: string
          format: uuid
          description: Outreach worker who created the reservation.
        status:
          type: string
          enum: [HELD, CONFIRMED, CANCELLED, EXPIRED]
          description: Current reservation status after this event.
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: When the hold expires. Present on reservation.created events.

    # -- dv-referral.* events ------------------------------------------------

    DvReferralEvent:
      allOf:
        - $ref: '#/components/schemas/DomainEventEnvelope'
        - type: object
          properties:
            type:
              type: string
              enum:
                - dv-referral.requested
                - dv-referral.responded
            payload:
              $ref: '#/components/schemas/DvReferralPayload'

    DvReferralPayload:
      type: object
      description: |
        DV referral event payload. Contains ZERO client PII — only operational
        identifiers. VAWA 34 U.S.C. 12291(b)(2) compliant. No client name, DOB,
        SSN, address, or phone is included. The token_id references a row that
        is hard-deleted within 24 hours of reaching terminal status.
      required:
        - token_id
        - shelter_id
      properties:
        token_id:
          type: string
          format: uuid
          description: Referral token identifier (hard-deleted within 24h).
        shelter_id:
          type: string
          format: uuid
          description: DV shelter this referral targets (RLS-protected).
        tenant_id:
          type: string
          format: uuid
          description: Continuum of Care tenant.
        urgency:
          type: string
          enum: [STANDARD, URGENT, EMERGENCY]
          description: Urgency level. Present on dv-referral.requested events.
        status:
          type: string
          enum: [ACCEPTED, REJECTED]
          description: Shelter response. Present on dv-referral.responded events only.

  # -----------------------------------------------------------------------
  # User lifecycle events (v0.19.0 — admin-user-management)
  # -----------------------------------------------------------------------

  UserLifecyclePayload:
    type: object
    description: |
      Payload for user lifecycle events: deactivation, reactivation, role change.
      Published to the EventBus when admin actions modify user accounts.
      Consumed by NotificationService (SSE disconnect on deactivation) and
      AuditEventService (persistence to audit_events table).
    properties:
      user_id:
        type: string
        format: uuid
        description: UUID of the affected user.
      tenant_id:
        type: string
        format: uuid
        description: Continuum of Care tenant.
      action:
        type: string
        enum: [USER_DEACTIVATED, USER_REACTIVATED, ROLE_CHANGED, DV_ACCESS_CHANGED]
        description: The admin action performed.
      actor_user_id:
        type: string
        format: uuid
        description: UUID of the admin who performed the action.
      details:
        type: object
        description: Old/new values (e.g., old_roles, new_roles).
