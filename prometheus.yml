# Prometheus scrape config for FABT.
#
# When running via ./dev-start.sh --observability, the backend starts with
# management.server.port=9090, so actuator endpoints (including /actuator/prometheus)
# are available on port 9090 without JWT authentication.
# The application API on :8080 remains fully secured.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'fabt-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:9091']
        labels:
          application: 'finding-a-bed-tonight'
