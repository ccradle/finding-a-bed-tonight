# Prometheus scrape config for FABT.
#
# Scrape target uses the docker compose service name `backend` so it works
# the same way on Linux Docker Engine (Oracle VM) and Docker Desktop
# (macOS dev). The previous target `host.docker.internal:9091` only
# resolves on macOS / Docker Desktop natively; on Linux it requires an
# explicit `extra_hosts: ["host.docker.internal:host-gateway"]` in the
# prometheus service config, which prod doesn't have. That mismatch left
# Prometheus unable to scrape the backend on the VM (discovered during
# v0.40 deploy 2026-04-16; pre-existing config bug from the original
# operational-monitoring change set 2026-03-30).
#
# Backend's actuator runs on port 9091 under the `--observability` compose
# profile (which prod and `dev-start.sh --observability` both use). The
# application API on :8080 remains fully secured (JWT-required).

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  # env=prod label is attached to EVERY scraped time-series. The Phase C
  # alert rules in deploy/prometheus/phase-c-cache-isolation.rules.yml
  # filter on env="prod" so CI / dev / staging scrapes (which use
  # prometheus.dev.yml without this label, see the companion file) do not
  # false-page the production on-call when the Tenant4bMigrationCrossTenantAttackTest
  # harness intentionally fires cross_tenant_reject counters. Added 2026-04-19
  # per pre-release warroom Jordan blocker #1 — PR #140.
  external_labels:
    env: prod

scrape_configs:
  - job_name: 'fabt-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['backend:9091']
        labels:
          application: 'finding-a-bed-tonight'
