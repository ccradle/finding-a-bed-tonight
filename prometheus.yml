# Prometheus scrape config for FABT.
#
# Scrape target uses the docker compose service name `backend` so it works
# the same way on Linux Docker Engine (Oracle VM) and Docker Desktop
# (macOS dev). The previous target `host.docker.internal:9091` only
# resolves on macOS / Docker Desktop natively; on Linux it requires an
# explicit `extra_hosts: ["host.docker.internal:host-gateway"]` in the
# prometheus service config, which prod doesn't have. That mismatch left
# Prometheus unable to scrape the backend on the VM (discovered during
# v0.40 deploy 2026-04-16; pre-existing config bug from the original
# operational-monitoring change set 2026-03-30).
#
# Backend's actuator runs on port 9091 under the `--observability` compose
# profile (which prod and `dev-start.sh --observability` both use). The
# application API on :8080 remains fully secured (JWT-required).

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  # NOTE on env=prod placement (post-v0.47.0-deploy finding):
  # external_labels is attached to metrics sent OUT to federation / remote_write
  # / Alertmanager — NOT to local PromQL queries or rule evaluation. The Phase C
  # alert rules filter on env="prod" in their PromQL selector, so the label
  # must be attached DURING scrape (instance-level) to be visible at rule-eval
  # time. Moved env=prod from here (external_labels) to the scrape_configs
  # static_configs labels block below. prometheus.dev.yml deliberately omits
  # env=prod so dev scrapes stay unlabelled.

# Rule file glob matching files in /etc/prometheus/rules/ inside the
# container. The volume is mounted by docker-compose.yml Prometheus
# service block (`./deploy/prometheus:/etc/prometheus/rules:ro`).
# Currently loads:
#   - phase-b-rls.rules.yml        (5 Phase B rules — retroactively wired)
#   - phase-c-cache-isolation.rules.yml (4 Phase C rules)
# Added 2026-04-19 per v0.47.0 pre-release deep warroom blocker #1.
rule_files:
  - '/etc/prometheus/rules/*.rules.yml'

scrape_configs:
  - job_name: 'fabt-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['backend:9091']
        labels:
          application: 'finding-a-bed-tonight'
          # env=prod attached at scrape time so Phase C alert rules can
          # filter {env="prod"} at rule-eval. Fixed 2026-04-20 during
          # v0.47.0 post-deploy Gate 7 verification — external_labels
          # placement was wrong (see NOTE in global: block above).
          env: 'prod'
