# deploy/pgaudit.conf — drop-in for /etc/postgresql/conf.d merged into
# postgresql.conf at container start.
#
# pgaudit must be preloaded so that CREATE EXTENSION pgaudit succeeds
# and the per-database pgaudit.* session parameters (set by Flyway V73)
# take effect at session start.
#
# Per Phase B warroom V1 + Risk R3: per-database parameters are in V73,
# not here. Keep this file minimal so preload concerns are separated
# from audit-policy concerns.

shared_preload_libraries = 'pgaudit'

# Postgres-level log destination — pgaudit emits through the standard
# log sink so promtail/Loki picks it up. No separate pgaudit log file.
log_destination = 'stderr'
logging_collector = off

# v0.45.0 task 3.11 — include application_name in every log line so
# pgaudit entries carry the tenant UUID. RlsDataSourceConfig sets
# application_name = 'fabt:tenant:<uuid>' on every connection borrow,
# co-located with app.tenant_id in a single statement (drift-safety
# covered by PgauditApplicationNameDriftTest). Trailing space is
# significant — Postgres concatenates the message right after.
log_line_prefix = '%m [%p] %q%u@%d app=%a '
