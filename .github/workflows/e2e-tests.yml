name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------------
  # DV Canary — MUST pass before any other E2E tests run.
  # A DV shelter appearing in a public query is a data protection failure.
  # -------------------------------------------------------------------------
  dv-canary:
    name: DV Access Control Canary
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fabt
          POSTGRES_USER: fabt
          POSTGRES_PASSWORD: fabt
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fabt"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Create fabt_app DB role for RLS enforcement
        run: |
          PGPASSWORD=fabt psql -h localhost -U fabt -d fabt -c "
            DO \$\$ BEGIN
              IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'fabt_app') THEN
                CREATE ROLE fabt_app WITH LOGIN PASSWORD 'fabt_app' NOSUPERUSER NOCREATEDB NOCREATEROLE;
              END IF;
            END \$\$;
            GRANT CONNECT ON DATABASE fabt TO fabt_app;
          "

      - name: Build backend
        working-directory: backend
        run: mvn compile -q --batch-mode --no-transfer-progress

      - name: Start backend
        run: |
          mkdir -p logs
          cd backend && mvn spring-boot:run -q > ../logs/backend.log 2>&1 &
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/fabt
          SPRING_DATASOURCE_USERNAME: fabt_app
          SPRING_DATASOURCE_PASSWORD: fabt_app
          FABT_DB_URL: jdbc:postgresql://localhost:5432/fabt
          FABT_DB_OWNER_USER: fabt
          FABT_DB_OWNER_PASSWORD: fabt

      - name: Wait for backend readiness
        run: |
          echo "Waiting for backend health..."
          for i in {1..45}; do
            if curl -sf http://localhost:8080/actuator/health/liveness; then
              echo "Backend is ready after ${i} attempts"
              exit 0
            fi
            echo "Attempt ${i}/45 — waiting 2s..."
            sleep 2
          done
          echo "Backend failed to start within 90 seconds"
          curl -v http://localhost:8080/actuator/health/liveness || true
          cat logs/backend.log | tail -100 || true
          exit 1

      - name: Grant permissions to fabt_app + load seed data
        run: |
          PGPASSWORD=fabt psql -h localhost -U fabt -d fabt -c "
            GRANT USAGE ON SCHEMA public TO fabt_app;
            GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO fabt_app;
            GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO fabt_app;
          "
          PGPASSWORD=fabt psql -h localhost -U fabt -d fabt < infra/scripts/seed-data.sql

      - name: Run DV canary tests
        working-directory: e2e/karate
        run: mvn test -Dtest="KarateRunnerTest" -Dkarate.options="classpath:features/dv-access" --batch-mode --no-transfer-progress

  # -------------------------------------------------------------------------
  # E2E Tests — Karate API + Playwright UI (blocked by dv-canary)
  # -------------------------------------------------------------------------
  e2e-tests:
    name: E2E (Playwright + Karate)
    needs: [dv-canary]
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fabt
          POSTGRES_USER: fabt
          POSTGRES_PASSWORD: fabt
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fabt"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create fabt_app DB role for RLS enforcement
        run: |
          PGPASSWORD=fabt psql -h localhost -U fabt -d fabt -c "
            DO \$\$ BEGIN
              IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'fabt_app') THEN
                CREATE ROLE fabt_app WITH LOGIN PASSWORD 'fabt_app' NOSUPERUSER NOCREATEDB NOCREATEROLE;
              END IF;
            END \$\$;
            GRANT CONNECT ON DATABASE fabt TO fabt_app;
          "

      - name: Build backend
        working-directory: backend
        run: mvn compile -q --batch-mode --no-transfer-progress

      - name: Start backend
        run: |
          mkdir -p logs
          cd backend && mvn spring-boot:run -q > ../logs/backend.log 2>&1 &
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/fabt
          SPRING_DATASOURCE_USERNAME: fabt_app
          SPRING_DATASOURCE_PASSWORD: fabt_app
          FABT_DB_URL: jdbc:postgresql://localhost:5432/fabt
          FABT_DB_OWNER_USER: fabt
          FABT_DB_OWNER_PASSWORD: fabt

      - name: Wait for backend readiness
        run: |
          echo "Waiting for backend health..."
          for i in {1..45}; do
            if curl -sf http://localhost:8080/actuator/health/liveness; then
              echo "Backend is ready after ${i} attempts"
              exit 0
            fi
            echo "Attempt ${i}/45 — waiting 2s..."
            sleep 2
          done
          echo "Backend failed to start within 90 seconds"
          curl -v http://localhost:8080/actuator/health/liveness || true
          cat logs/backend.log | tail -100 || true
          exit 1

      - name: Grant permissions to fabt_app + load seed data
        run: |
          PGPASSWORD=fabt psql -h localhost -U fabt -d fabt -c "
            GRANT USAGE ON SCHEMA public TO fabt_app;
            GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO fabt_app;
            GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO fabt_app;
          "
          PGPASSWORD=fabt psql -h localhost -U fabt -d fabt < infra/scripts/seed-data.sql

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Start frontend
        working-directory: frontend
        run: npm run dev > ../logs/frontend.log 2>&1 &

      - name: Wait for frontend readiness
        run: |
          for i in {1..15}; do
            if curl -sf http://localhost:5173; then
              echo "Frontend ready after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          echo "Frontend failed to start"
          exit 1

      # --- Karate API Tests ---
      - name: Run Karate API tests
        working-directory: e2e/karate
        run: mvn test -Dtest="KarateRunnerTest" --batch-mode --no-transfer-progress
        continue-on-error: true

      - name: Upload Karate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: karate-report
          path: e2e/karate/target/karate-reports/

      # --- Playwright UI Tests ---
      - name: Install Playwright dependencies
        working-directory: e2e/playwright
        run: npm ci && npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: e2e/playwright
        run: npx playwright test
        continue-on-error: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright/playwright-report/

  # -------------------------------------------------------------------------
  # Performance Tests — Gatling (main branch only, blocked by dv-canary)
  # -------------------------------------------------------------------------
  performance-tests:
    name: Performance (Gatling)
    needs: [dv-canary]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fabt
          POSTGRES_USER: fabt
          POSTGRES_PASSWORD: fabt
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fabt"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Create fabt_app DB role for RLS enforcement
        run: |
          PGPASSWORD=fabt psql -h localhost -U fabt -d fabt -c "
            DO \$\$ BEGIN
              IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'fabt_app') THEN
                CREATE ROLE fabt_app WITH LOGIN PASSWORD 'fabt_app' NOSUPERUSER NOCREATEDB NOCREATEROLE;
              END IF;
            END \$\$;
            GRANT CONNECT ON DATABASE fabt TO fabt_app;
          "

      - name: Build and start backend
        run: |
          mkdir -p logs
          cd backend && mvn compile -q --batch-mode --no-transfer-progress
          mvn spring-boot:run -q > ../logs/backend.log 2>&1 &
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/fabt
          SPRING_DATASOURCE_USERNAME: fabt_app
          SPRING_DATASOURCE_PASSWORD: fabt_app
          FABT_DB_URL: jdbc:postgresql://localhost:5432/fabt
          FABT_DB_OWNER_USER: fabt
          FABT_DB_OWNER_PASSWORD: fabt

      - name: Wait for backend readiness
        run: |
          for i in {1..45}; do
            if curl -sf http://localhost:8080/actuator/health/liveness; then exit 0; fi
            sleep 2
          done
          cat logs/backend.log | tail -100 || true
          exit 1

      - name: Grant permissions to fabt_app + load seed data
        run: |
          PGPASSWORD=fabt psql -h localhost -U fabt -d fabt -c "
            GRANT USAGE ON SCHEMA public TO fabt_app;
            GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO fabt_app;
            GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO fabt_app;
          "
          PGPASSWORD=fabt psql -h localhost -U fabt -d fabt < infra/scripts/seed-data.sql

      - name: Run Gatling simulations
        working-directory: e2e/gatling
        run: mvn verify -Pperf --batch-mode --no-transfer-progress

      - name: Upload Gatling report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gatling-report
          path: e2e/gatling/target/gatling/
