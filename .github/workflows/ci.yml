name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Java 25 + Maven)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Build and test
        working-directory: backend
        run: mvn verify --batch-mode --no-transfer-progress
      # OWASP Dependency Check disabled — requires NVD API key for rate limits.
      # Scanning is handled by a separate dedicated project.
      # - name: OWASP Dependency Check
      #   working-directory: backend
      #   run: mvn dependency-check:check -DfailBuildOnCVSS=7 --batch-mode --no-transfer-progress

  frontend:
    name: Frontend (Node 20 + Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint 2>/dev/null || echo "No lint script configured"
      - name: Build
        working-directory: frontend
        run: npm run build

  legal-language:
    name: Legal Language Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for overclaimed compliance language
        run: bash infra/scripts/legal-language-scan.sh .

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Build backend JAR
        working-directory: backend
        run: mvn package -DskipTests --batch-mode --no-transfer-progress
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.backend
          push: true
          tags: ghcr.io/ccradle/finding-a-bed-tonight-backend:${{ github.sha }},ghcr.io/ccradle/finding-a-bed-tonight-backend:latest
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.frontend
          push: true
          tags: ghcr.io/ccradle/finding-a-bed-tonight-frontend:${{ github.sha }},ghcr.io/ccradle/finding-a-bed-tonight-frontend:latest
