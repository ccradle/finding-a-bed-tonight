name: CI

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches:
      - main
      - 'release/**'

permissions:
  contents: read

jobs:
  release-gate-pin-verify:
    name: Release-gate SHA-256 pin verify (v0.45 W-CHANGELOG-1)
    runs-on: ubuntu-latest
    # Enforces that every SHA-256 in deploy/release-gate-pins.txt matches
    # the current file content. Makes the pin load-bearing instead of
    # decorative — an operator editing pg-policies-snapshot.md without
    # updating the pin (and without CODEOWNERS re-review) will fail CI
    # before the drift ever reaches prod.
    steps:
      - uses: actions/checkout@v4
      - name: Verify release-gate pins
        run: bash scripts/ci/verify-release-gate-pins.sh

  flyway-hwm-guard:
    name: Flyway HWM guard (v0.45 renumber-forward)
    runs-on: ubuntu-latest
    # v0.45 task #151 — enforces the renumber-forward Flyway posture
    # chosen in the Phase B close-out warroom: new migrations must have
    # version > deploy/prod-state.json.appliedMigrationsHighWaterMark.
    # Removes the need for SPRING_FLYWAY_OUT_OF_ORDER=true bridge
    # compose on the VM going forward. See the script docstring +
    # docs/runbook.md -> 'Flyway Out-of-Order Posture' for rationale.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history to diff PR against base
      - name: Check new migrations against HWM
        env:
          BASE_REF: ${{ github.base_ref && format('origin/{0}', github.base_ref) || 'origin/main' }}
        run: bash scripts/ci/check-flyway-migration-versions.sh

  backend:
    name: Backend (Java 25 + Maven)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Build and test
        working-directory: backend
        run: mvn verify --batch-mode --no-transfer-progress
      # OWASP Dependency Check disabled — requires NVD API key for rate limits.
      # Scanning is handled by a separate dedicated project.
      # - name: OWASP Dependency Check
      #   working-directory: backend
      #   run: mvn dependency-check:check -DfailBuildOnCVSS=7 --batch-mode --no-transfer-progress

  pgaudit-image-tests:
    name: pgaudit image tests (Debian + PGDG)
    runs-on: ubuntu-latest
    # Phase B warroom V5: the single @Tag("pgaudit") test class
    # (PgauditLogEntryTest / task 3.24) requires the pre-built Debian
    # image from deploy/pgaudit.Dockerfile. The default backend job
    # uses postgres:16-alpine (no pgaudit available) and excludes the
    # tag via the default Surefire configuration. This dedicated job
    # builds the image and runs the subset via `-P pgaudit-tests`.
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Build fabt-pgaudit:ci image
        run: docker build -t fabt-pgaudit:ci -f deploy/pgaudit.Dockerfile deploy/
      - name: Run pgaudit-tagged tests
        working-directory: backend
        run: mvn test -P pgaudit-tests --batch-mode --no-transfer-progress

  frontend:
    name: Frontend (Node 20 + Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint 2>/dev/null || echo "No lint script configured"
      - name: Build
        working-directory: frontend
        run: npm run build

  legal-language:
    name: Legal Language Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for overclaimed compliance language
        run: bash infra/scripts/legal-language-scan.sh .

  family-c-annotation-review-gate:
    # Phase C task 4.5: auto-request @ccradle review on any PR that
    # introduces a new @TenantUnscopedCache or @TenantScopedByConstruction
    # usage. CODEOWNERS is path-based and does NOT trigger when a new
    # annotation is added to an existing file — this job closes that gap
    # per design-c D-4.23-2 warroom resolution.
    name: Family C annotation review gate (4.5)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect new @TenantUnscopedCache / @TenantScopedByConstruction usages
        id: detect
        run: |
          set -eo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          # Count NEW occurrences (added lines) containing the annotations
          # in the PR diff. Exclude the annotation definitions themselves
          # (TenantUnscopedCache.java, TenantScopedByConstruction.java) so
          # edits to the annotations don't self-trigger.
          NEW_USAGES=$(git diff "$BASE_SHA" "$HEAD_SHA" -- \
              ':(exclude)backend/src/main/java/org/fabt/shared/security/TenantUnscopedCache.java' \
              ':(exclude)backend/src/main/java/org/fabt/shared/security/TenantScopedByConstruction.java' \
              | grep -E '^\+[^+]' \
              | grep -cE '@TenantUnscopedCache\(|@TenantScopedByConstruction\(' \
              || true)
          echo "new_usages=$NEW_USAGES" >> "$GITHUB_OUTPUT"
          if [ "$NEW_USAGES" -gt 0 ]; then
            echo "::notice::PR introduces $NEW_USAGES new @TenantUnscopedCache / @TenantScopedByConstruction usage(s) — @ccradle review required."
          else
            echo "No new annotation usages detected in this PR."
          fi
      - name: Post review-required comment
        if: steps.detect.outputs.new_usages != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const newUsages = '${{ steps.detect.outputs.new_usages }}';
            const body = [
              '## Family C annotation review gate',
              '',
              `This PR introduces **${newUsages} new** \`@TenantUnscopedCache\` / \`@TenantScopedByConstruction\` usage(s).`,
              '',
              'Per Phase C task 4.5 (warroom D-4.23-2): every new introduction requires `@ccradle` review to verify the justification.',
              '',
              'Reviewer checklist (per annotation):',
              '- For `@TenantUnscopedCache`: confirm the justification describes a structurally platform-wide key space (globally unique UUID, token hash, JTI, pre-auth slug, etc.).',
              '- For `@TenantScopedByConstruction`: confirm (a) the key includes `tenantId` structurally AND (b) the read path has an explicit `tenantId`-match check that emits `CROSS_TENANT_*` audit + counter on mismatch.',
              '',
              'Auto-requesting `@ccradle` as reviewer.',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
            // Auto-request @ccradle as reviewer (no-op if already requested)
            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                reviewers: ['ccradle'],
              });
            } catch (e) {
              // Author cannot request themselves as reviewer — expected on
              // solo-maintainer repos. Swallow the error so the job stays green.
              core.info('requestReviewers no-op: ' + e.message);
            }

  phase-b-rls-test-discipline:
    name: Phase B RLS test-discipline (no naked audit queries)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject naked jdbcTemplate queries on RLS'd tables
        # Post-Phase-B, FORCE RLS on audit_events + 6 others filters all
        # rows when app.tenant_id is empty. Tests that query these tables
        # outside a TenantContext.runWithContext wrap silently return 0
        # rows and fail with misleading assertions. Sam warroom W-B-4:
        # enforce the test-side pattern via CI rather than docs alone.
        run: |
          set -eo pipefail
          # Search all test files for jdbcTemplate query methods referencing
          # RLS'd tables. Allowlist: WithTenantContext.readAs/doAs helpers
          # and the test helper's own definition.
          RLS_TABLES='audit_events|hmis_audit_log|password_reset_token|one_time_access_code|hmis_outbox|tenant_key_material|kid_to_tenant_key'
          # Grep tests for queryFor(Object|List|Map)/update on those tables,
          # then subtract lines that are inside a readAs/doAs block.
          VIOLATIONS=$(grep -rInE "jdbcTemplate?\.(queryFor(Object|List|Map)|update)\b[^)]*\"[^\"]*(${RLS_TABLES})" \
                          backend/src/test/java/ \
                          --include='*.java' \
                          --exclude='WithTenantContext.java' || true)
          if [[ -n "$VIOLATIONS" ]]; then
            # A naked call is a match NOT preceded within 3 lines by
            # WithTenantContext.(readAs|doAs|readAsSystem|doAsSystem)(. We
            # can't do 3-line proximity in grep; use awk instead.
            # Sam warroom checkpoint: use FNR (per-file line number) not NR
            # (file-concatenated line number). Otherwise wrap_until set while
            # scanning file A could spuriously allow matches in the first
            # <wrap_until> lines of file B, producing silent false-negatives.
            # Reset wrap_until at each file boundary (FNR==1).
            NAKED=$(awk '
              FNR == 1 { wrap_until = 0 }
              /WithTenantContext\.(readAs|doAs|readAsSystem|doAsSystem)/ { wrap_until = FNR + 10 }
              /jdbcTemplate?\.(queryFor|update)\b.*"(.*)(audit_events|hmis_audit_log|password_reset_token|one_time_access_code|hmis_outbox|tenant_key_material|kid_to_tenant_key)/ {
                if (FNR > wrap_until) print FILENAME ":" FNR ": " $0
              }
            ' $(find backend/src/test/java -name '*.java' -not -name 'WithTenantContext.java'))
            if [[ -n "$NAKED" ]]; then
              echo "::error::Phase B CI guard — naked jdbcTemplate queries on RLS'd tables detected."
              echo "Wrap the query in org.fabt.testsupport.WithTenantContext.readAs(tenantId, () -> ...)"
              echo "OR org.fabt.testsupport.WithTenantContext.doAs(tenantId, () -> ...) so FORCE RLS"
              echo "can see the rows. See docs/security/phase-b-silent-audit-write-failures-runbook.md."
              echo
              echo "Violations:"
              echo "$NAKED"
              exit 1
            fi
          fi
          echo "No naked RLS-table queries detected — Phase B test discipline holds."

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Build backend JAR
        working-directory: backend
        run: mvn package -DskipTests --batch-mode --no-transfer-progress
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.backend
          push: true
          tags: ghcr.io/ccradle/finding-a-bed-tonight-backend:${{ github.sha }},ghcr.io/ccradle/finding-a-bed-tonight-backend:latest
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.frontend
          push: true
          tags: ghcr.io/ccradle/finding-a-bed-tonight-frontend:${{ github.sha }},ghcr.io/ccradle/finding-a-bed-tonight-frontend:latest
