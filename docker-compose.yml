services:
  postgres:
    image: postgres:16-alpine
    # Phase 4 perf-diagnostic — load pg_stat_statements so we can measure
    # the markActed UPDATE + findById cost on warm dev DB (per
    # docs/performance/nyc-scale-load-test-plan.md). track=all captures
    # parse + plan + exec time per query plan.
    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements", "-c", "pg_stat_statements.track=all"]
    environment:
      POSTGRES_DB: fabt
      POSTGRES_USER: fabt
      POSTGRES_PASSWORD: fabt
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/scripts/init-app-user.sql:/docker-entrypoint-initdb.d/01-init-app-user.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fabt"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles:
      - standard
      - full

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    profiles:
      - full

  # --- OAuth2 profile (optional) ---
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    ports:
      - "8180:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_URL: http://keycloak:8080
    command: ["start-dev", "--import-realm"]
    volumes:
      - keycloak_data:/var/lib/keycloak/data
      - ./infra/keycloak/fabt-dev-realm.json:/opt/keycloak/data/import/fabt-dev-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /realms/fabt-dev/.well-known/openid-configuration HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && timeout 2 cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    profiles:
      - oauth2

  # --- Observability profile (optional) ---
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    # --web.enable-lifecycle exposes /-/reload so config changes can be
    # SIGHUPed without a container restart. Mandatory for the Phase C
    # `external_labels: env=prod` flow (prometheus.yml edit → reload →
    # env label propagates to scraped metrics). Without the flag the
    # reload endpoint returns 405 Method Not Allowed and only
    # `docker compose restart prometheus` picks up config changes.
    #
    # --config.file repeats the default because the flag list replaces
    # the image entrypoint's default args; keeping it explicit keeps
    # the invocation self-documenting.
    #
    # Added 2026-04-19 per v0.47.0 pre-release deep warroom blocker #1
    # (Jordan). Retroactively wires `phase-b-rls.rules.yml` + the four
    # Phase C `phase-c-cache-isolation.rules.yml` rules via the new
    # rules volume + prometheus.yml rule_files directive.
    command:
      - '--web.enable-lifecycle'
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus:/etc/prometheus/rules:ro
    profiles:
      - observability

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    profiles:
      - observability

  jaeger:
    image: jaegertracing/all-in-one:1.55
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    profiles:
      - observability

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    ports:
      - "4319:4318"
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    depends_on:
      - jaeger
    profiles:
      - observability

volumes:
  postgres_data:
  keycloak_data:
