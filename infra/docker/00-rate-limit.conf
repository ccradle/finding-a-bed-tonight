# Rate limiting zones for public API endpoints.
# Mounted in Docker nginx at /etc/nginx/conf.d/00-rate-limit.conf
# This file is loaded in the http context (before server blocks).
#
# Zone: 1m shared memory (~16,000 IPs), 10 requests/minute per IP.
# Applied to unauthenticated endpoints to prevent abuse and
# avoid OWASP WSTG-INFO-02 findings in security scans.

limit_req_zone $binary_remote_addr zone=public_api:1m rate=10r/m;
