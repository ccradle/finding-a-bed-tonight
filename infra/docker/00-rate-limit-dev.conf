# Dev override — same zones as production but with generous limits.
# Playwright tests generate rapid bursts of API calls from localhost.
# Production uses 00-rate-limit.conf (1r/s, burst=20).

limit_req_zone $binary_remote_addr zone=public_api:1m rate=100r/m;
limit_req_zone $binary_remote_addr zone=api_edge:1m rate=30r/s;

# ─── DemoGuard traffic source detection ───
# Copied from 00-rate-limit.conf — must stay in sync.
map $http_x_forwarded_for $fabt_traffic_source {
    default "public";
    ""      "tunnel";
}
