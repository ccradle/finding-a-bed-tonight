server {
    listen 80;
    server_tokens off;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers — also set at Spring layer (defense-in-depth)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; manifest-src 'self'; worker-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # SPA routing — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # SSE notifications — must disable buffering for streaming
    location /api/v1/notifications/stream {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-FABT-Traffic-Source $fabt_traffic_source;
        # D11 defense-in-depth: strip client-supplied tenant headers.
        # Backend resolves tenant from JWT claims only; these headers are never
        # read by the application. Stripping prevents accidental future reliance.
        proxy_set_header X-FABT-Tenant-Id "";
        proxy_set_header X-Scope-OrgID "";
        proxy_set_header X-Tenant-Id "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        # Tell Cloudflare and upstream proxies not to buffer the SSE stream
        add_header X-Accel-Buffering "no" always;
    }

    # Rate-limited public API endpoints (zone defined in rate-limit.conf).
    # /api/v1/version is a static, non-PII endpoint — make it cacheable so
    # Cloudflare + browsers absorb the load. The rate limit stays as
    # defense-in-depth, but caching prevents Playwright smoke bursts (15
    # tests × fresh browser context) from exhausting the burst=5 allowance
    # and tripping 429s, which otherwise cascade into appVersion=null and
    # Layout footer-render-guard false in the frontend (v0.50 post-deploy
    # lesson; see feedback_smoke_config_on_prod.md).
    location = /api/v1/version {
        limit_req zone=public_api burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-FABT-Traffic-Source $fabt_traffic_source;
        proxy_set_header X-FABT-Tenant-Id "";
        proxy_set_header X-Scope-OrgID "";
        proxy_set_header X-Tenant-Id "";
        # Backend sends Cache-Control: no-cache,no-store,max-age=0,must-revalidate
        # (Spring Security default for unauthenticated endpoints). Strip and
        # override — the response is a public, immutable build identifier.
        proxy_hide_header Cache-Control;
        proxy_hide_header Pragma;
        proxy_hide_header Expires;
        add_header Cache-Control "public, max-age=60" always;
    }

    # Proxy API requests to backend
    # Edge rate limit: 1 req/sec (60/min) per IP with burst=50.
    # burst=50 accommodates SPA parallel requests (~6 per page load) and demo evaluators
    # navigating quickly. Catches sustained volumetric brute-force before JVM.
    # Bucket4j handles fine-grained per-IP failure tracking on auth endpoints.
    location /api/ {
        limit_req zone=api_edge burst=50 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-FABT-Traffic-Source $fabt_traffic_source;
        proxy_set_header X-FABT-Tenant-Id "";
        proxy_set_header X-Scope-OrgID "";
        proxy_set_header X-Tenant-Id "";
    }

    # Proxy actuator requests
    location /actuator/ {
        proxy_pass http://backend:8080;
        proxy_set_header X-FABT-Tenant-Id "";
        proxy_set_header X-Scope-OrgID "";
        proxy_set_header X-Tenant-Id "";
    }

    # SPA entry point — never cache (ensures fresh deploys)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; manifest-src 'self'; worker-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    # Service worker — NEVER cache. Browser must check for updates on every navigation.
    # Without this, deployments don't take effect until the browser's cache expires (up to 1 year).
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # PWA manifest — no-cache to ensure updates to name, icons, theme are picked up
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache" always;
        add_header Content-Type "application/manifest+json" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Cache static assets — ONLY hashed files (content-addressable, safe to cache forever)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }
}
